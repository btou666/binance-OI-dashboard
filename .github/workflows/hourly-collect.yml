name: Every-10min OI Collect

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/collect
        env:
          COLLECT_BASE_URL: ${{ secrets.COLLECT_BASE_URL }}
          COLLECT_API_TOKEN: ${{ secrets.COLLECT_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${COLLECT_BASE_URL:-}" ]; then
            echo "Missing secret: COLLECT_BASE_URL"
            exit 1
          fi

          endpoint="${COLLECT_BASE_URL%/}/api/collect"
          echo "Calling: ${endpoint}"

          if [ -n "${COLLECT_API_TOKEN:-}" ]; then
            status_code="$(curl -sS -o response.json -w '%{http_code}' -X POST "${endpoint}" -H "x-collect-token: ${COLLECT_API_TOKEN}")"
          else
            status_code="$(curl -sS -o response.json -w '%{http_code}' -X POST "${endpoint}")"
          fi

          cat response.json
          echo "HTTP status: ${status_code}"

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Collect API returned non-2xx status."
            exit 1
          fi

          if grep -q '"ok":false' response.json; then
            echo "Collect result indicates failure."
            exit 1
          fi
